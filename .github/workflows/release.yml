name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.binary }} (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        binary: [coordimap-local]
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify embedded topology App
        run: |
          ./scripts/build-topology-app.sh
          cmp web/topology-app/dist/topology.html internal/mcp/ui/topology.html

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          package="./cmd/${{ matrix.binary }}"
          output="dist/${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "$output" "$package"
          tar -C dist -czf "$output.tar.gz" "${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          sha256sum "$output.tar.gz" > "$output.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/* --generate-notes
