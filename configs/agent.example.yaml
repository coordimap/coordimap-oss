    #     - name: crawl_interval
    #       value: 30s

    # # --- eBPF Flows Data Source ---
    # # Captures runtime network flows with eBPF.
    # - type: flows
    #   id: ebpf-flows
    #   config:
    #     # Use "all" or a specific interface name like "eth0".
    #     - name: interface_name
